# cargo-deny configuration — v2 schema
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# In v2, vulnerability advisories always emit errors (not configurable).
# unmaintained: scope of unmaintained-crate checks (all | workspace | transitive | none)
unmaintained = "all"
# yanked: deny | warn | allow
yanked = "deny"
# Ignore known unmaintained/unsound transitive deps we cannot easily replace.
# Each entry cites (a) the crate, (b) the upstream chain blocking the upgrade,
# and (c) why the risk is acceptable for our usage.
ignore = [
    # bincode v2.0.1 via probe-rs — project ceased but 1.3.3 considered complete.
    "RUSTSEC-2025-0141",
    # paste v1.0.15 via ratatui 0.29 — archived proc-macro, no runtime surface.
    # Unblocks only on a ratatui 0.30 upgrade.
    "RUSTSEC-2024-0436",
    # quick-xml v0.36 via docx-rs 0.4 (opt-in `kb-office` DOCX ingestion only).
    # Both are DoS-class (quadratic duplicate-attribute check; unbounded
    # namespace-declaration allocation), patched in quick-xml >= 0.41 — but the
    # latest docx-rs (0.4.20) still requires ^0.36, so no fixed upstream exists.
    # The calamine (xlsx) path is really fixed: calamine 0.36 uses quick-xml
    # 0.41. Input is operator-provided documents, not a network surface.
    # Revisit on a docx-rs release that moves to quick-xml >= 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # The four below enter via the russh SSH stack (russh 0.45 / russh-cryptovec
    # / rsa), pulled only by the opt-in `remote-install` ssh/pty tools. They are
    # client-side crypto advisories against hosts the operator explicitly targets
    # (TOFU known-hosts), not a multi-tenant key-extraction surface. No fixed
    # upstream release for the 2026 advisories yet; revisit on a russh bump.
    # rsa Marvin timing sidechannel via russh-keys — no constant-time rsa release.
    "RUSTSEC-2023-0071",
    # russh-cryptovec: unchecked CryptoVec allocation/growth.
    "RUSTSEC-2026-0153",
    # russh: unbounded 32-bit allocation.
    "RUSTSEC-2026-0154",
    # russh: sender-binding gaps in channel messages.
    "RUSTSEC-2026-0159",
    # proc-macro-error2 v2.0.1 via matrix-sdk → aquamarine (doc-comment macro) —
    # build-time only, no runtime surface, no safe upgrade published upstream.
    "RUSTSEC-2026-0173",
    # ttf-parser v0.25 via lopdf 0.42 → pdf-extract (KB PDF text extraction) —
    # font parser flagged unmaintained; parse-only path over operator-supplied
    # documents, no fixed release (lopdf 0.42 is current). Revisit on a lopdf bump.
    "RUSTSEC-2026-0192",
]

[licenses]
# All licenses are denied unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    # CC0-1.0 (Creative Commons Zero) is a public-domain dedication, FSF
    # Free/Libre, more permissive than MIT (no attribution required).
    # Used by `notify` 8.x (hot-reload watcher).
    "CC0-1.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
