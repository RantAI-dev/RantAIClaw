name: Pub Docker Img

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
        paths:
            - "Dockerfile"
            - ".dockerignore"
            - "docker-compose.yml"
            - "rust-toolchain.toml"
            - "dev/config.template.toml"
            - ".github/workflows/pub-docker-img.yml"
    workflow_dispatch:

concurrency:
    group: docker-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    pr-smoke:
        name: PR Docker Smoke
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        runs-on: ubuntu-latest
        timeout-minutes: 25
        permissions:
            contents: read
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata (tags, labels)
              if: github.event_name == 'pull_request'
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=pr

            - name: Build smoke image
              uses: docker/build-push-action@v6
              env:
                  # See pub-release.yml: post-step build-record artifact upload
                  # is broken against the current Actions artifact API.
                  DOCKER_BUILD_SUMMARY: false
                  DOCKER_BUILD_RECORD_UPLOAD: false
              with:
                  context: .
                  push: false
                  load: true
                  provenance: false
                  sbom: false
                  tags: rantaiclaw-pr-smoke:latest
                  labels: ${{ steps.meta.outputs.labels || '' }}
                  platforms: linux/amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Verify image
              run: docker run --rm rantaiclaw-pr-smoke:latest --version

    # Build each platform on its OWN native runner (no QEMU) and push by
    # digest. QEMU-emulated arm64 compiled the dependency tree in ~50min and
    # blew past the 90min cap on a cold cache — and because the run never
    # finished, `cache-to` never exported, so every run stayed cold. Native
    # arm64 (ubuntu-24.04-arm, free for public repos) removes the emulation.
    build:
        name: Build ${{ matrix.platform }}
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 45
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Prepare platform + image vars
              shell: bash
              run: |
                  set -euo pipefail
                  platform="${{ matrix.platform }}"
                  echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
                  image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                  echo "IMAGE=${image,,}" >> "$GITHUB_ENV"

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              env:
                  # See pub-release.yml: post-step build-record artifact upload
                  # is broken against the current Actions artifact API.
                  DOCKER_BUILD_SUMMARY: false
                  DOCKER_BUILD_RECORD_UPLOAD: false
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  provenance: false
                  sbom: false
                  outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
                  # Per-platform cache scope so amd64 and arm64 don't evict
                  # each other's layers.
                  cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
                  cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

            - name: Export digest
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v4
              with:
                  name: digests-${{ env.PLATFORM_PAIR }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: Merge and Push Manifest
        needs: [build]
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write
        steps:
            - name: Download digests
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute tags
              id: meta
              shell: bash
              run: |
                  set -euo pipefail
                  IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                  IMAGE="${IMAGE,,}"
                  SHA_TAG="${IMAGE}:sha-${GITHUB_SHA::12}"

                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    TAG_NAME="${GITHUB_REF#refs/tags/}"
                    PRIMARY="${IMAGE}:${TAG_NAME}"
                  elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
                    PRIMARY="${IMAGE}:latest"
                  else
                    BRANCH_NAME="${GITHUB_REF#refs/heads/}"
                    BRANCH_NAME="${BRANCH_NAME//\//-}"
                    PRIMARY="${IMAGE}:${BRANCH_NAME}"
                  fi

                  {
                    echo "image=${IMAGE}"
                    echo "primary=${PRIMARY}"
                    printf 'tags<<EOF\n%s\n%s\nEOF\n' "${PRIMARY}" "${SHA_TAG}"
                  } >> "$GITHUB_OUTPUT"

            - name: Create and push manifest list
              working-directory: /tmp/digests
              shell: bash
              run: |
                  set -euo pipefail
                  tag_args=()
                  while IFS= read -r t; do
                    [ -n "$t" ] && tag_args+=("-t" "$t")
                  done <<< "${{ steps.meta.outputs.tags }}"

                  digest_refs=()
                  for f in *; do
                    digest_refs+=("${{ steps.meta.outputs.image }}@sha256:${f}")
                  done

                  docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

            - name: Inspect manifest
              shell: bash
              run: docker buildx imagetools inspect "${{ steps.meta.outputs.primary }}"

            - name: Set GHCR package visibility to public
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  owner="${GITHUB_REPOSITORY_OWNER,,}"
                  repo="${GITHUB_REPOSITORY#*/}"

                  # Package path can vary depending on repository/package linkage.
                  candidates=(
                    "$repo"
                    "${owner}%2F${repo}"
                  )

                  for scope in orgs users; do
                    for pkg in "${candidates[@]}"; do
                      code="$(curl -sS -o /tmp/ghcr-visibility.json -w "%{http_code}" \
                        -X PATCH \
                        -H "Authorization: Bearer ${GH_TOKEN}" \
                        -H "Accept: application/vnd.github+json" \
                        -H "X-GitHub-Api-Version: 2022-11-28" \
                        "https://api.github.com/${scope}/${owner}/packages/container/${pkg}/visibility" \
                        -d '{"visibility":"public"}' || true)"

                      if [ "$code" = "200" ] || [ "$code" = "204" ]; then
                        echo "GHCR package visibility is public (${scope}/${owner}/${pkg})."
                        exit 0
                      fi

                      echo "Visibility attempt ${scope}/${owner}/${pkg} returned HTTP ${code}."
                    done
                  done

                  echo "::warning::Unable to update GHCR visibility via API in this run; proceeding to direct anonymous pull verification."

            - name: Verify anonymous GHCR pull access (non-blocking)
              continue-on-error: true
              shell: bash
              run: |
                  set -euo pipefail
                  token_resp="$(curl -sS "https://ghcr.io/token?scope=repository:${GITHUB_REPOSITORY}:pull")"
                  token="$(echo "$token_resp" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"

                  if [ -z "$token" ]; then
                    echo "::warning::Anonymous GHCR token request failed: $token_resp"
                    exit 0
                  fi

                  code="$(curl -sS -o /tmp/ghcr-manifest.json -w "%{http_code}" \
                    -H "Authorization: Bearer ${token}" \
                    -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
                    "https://ghcr.io/v2/${GITHUB_REPOSITORY}/manifests/latest")"

                  if [ "$code" != "200" ]; then
                    echo "::warning::Anonymous manifest pull failed with HTTP ${code}"
                    cat /tmp/ghcr-manifest.json || true
                    exit 0
                  fi

                  echo "Anonymous GHCR pull access verified."
