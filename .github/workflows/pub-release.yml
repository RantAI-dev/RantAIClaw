name: Pub Release

on:
    push:
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            release_ref:
                description: "Git ref (branch, tag, or SHA) to build"
                required: false
                default: "main"
                type: string
            publish_release:
                description: "Publish a GitHub release (false = verification build only)"
                required: false
                default: false
                type: boolean
            release_tag:
                description: "Existing release tag (required when publish_release=true), e.g. v0.1.1"
                required: false
                default: ""
                type: string
            draft:
                description: "Create release as draft (manual publish only)"
                required: false
                default: true
                type: boolean
    schedule:
        # Weekly release-readiness verification on default branch (no publish)
        - cron: "17 8 * * 1"

concurrency:
    group: release-${{ github.ref || github.run_id }}
    cancel-in-progress: false

permissions:
    contents: write
    packages: write
    actions: read
    id-token: write # Required for cosign keyless signing via OIDC

env:
    CARGO_TERM_COLOR: always
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    prepare:
        name: Prepare Release Context
        runs-on: ubuntu-latest
        outputs:
            release_ref: ${{ steps.vars.outputs.release_ref }}
            release_tag: ${{ steps.vars.outputs.release_tag }}
            publish_release: ${{ steps.vars.outputs.publish_release }}
            draft_release: ${{ steps.vars.outputs.draft_release }}
        steps:
            - name: Resolve release inputs
              id: vars
              shell: bash
              run: |
                  set -euo pipefail

                  event_name="${GITHUB_EVENT_NAME}"
                  publish_release="false"
                  draft_release="false"
                  semver_pattern='^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'

                  if [[ "$event_name" == "push" ]]; then
                    release_ref="${GITHUB_REF_NAME}"
                    release_tag="${GITHUB_REF_NAME}"
                    publish_release="true"
                  elif [[ "$event_name" == "workflow_dispatch" ]]; then
                    release_ref="${{ inputs.release_ref }}"
                    publish_release="${{ inputs.publish_release }}"
                    draft_release="${{ inputs.draft }}"

                    if [[ "$publish_release" == "true" ]]; then
                      release_tag="${{ inputs.release_tag }}"
                      if [[ -z "$release_tag" ]]; then
                        echo "::error::release_tag is required when publish_release=true"
                        exit 1
                      fi
                      release_ref="$release_tag"
                    else
                      release_tag="verify-${GITHUB_SHA::12}"
                    fi
                  else
                    # schedule
                    release_ref="main"
                    release_tag="verify-${GITHUB_SHA::12}"
                  fi

                  if [[ "$publish_release" == "true" ]]; then
                    if [[ ! "$release_tag" =~ $semver_pattern ]]; then
                      echo "::error::release_tag must match semver-like format (vX.Y.Z[-suffix])"
                      exit 1
                    fi
                    if ! git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${release_tag}" >/dev/null; then
                      echo "::error::Tag ${release_tag} does not exist on origin. Push the tag first, then rerun manual publish."
                      exit 1
                    fi

                    # Guardrail: release tags must resolve to commits already reachable from main.
                    tmp_repo="$(mktemp -d)"
                    trap 'rm -rf "$tmp_repo"' EXIT
                    git -C "$tmp_repo" init -q
                    git -C "$tmp_repo" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
                    git -C "$tmp_repo" fetch --quiet --filter=blob:none origin main "refs/tags/${release_tag}:refs/tags/${release_tag}"
                    if ! git -C "$tmp_repo" merge-base --is-ancestor "refs/tags/${release_tag}" "origin/main"; then
                      echo "::error::Tag ${release_tag} is not reachable from origin/main. Release tags must be cut from main."
                      exit 1
                    fi
                  fi

                  {
                    echo "release_ref=${release_ref}"
                    echo "release_tag=${release_tag}"
                    echo "publish_release=${publish_release}"
                    echo "draft_release=${draft_release}"
                  } >> "$GITHUB_OUTPUT"

                  {
                    echo "### Release Context"
                    echo "- event: ${event_name}"
                    echo "- release_ref: ${release_ref}"
                    echo "- release_tag: ${release_tag}"
                    echo "- publish_release: ${publish_release}"
                    echo "- draft_release: ${draft_release}"
                  } >> "$GITHUB_STEP_SUMMARY"

    build-release:
        name: Build ${{ matrix.target }}
        needs: [prepare]
        runs-on: ${{ matrix.os }}
        timeout-minutes: 40
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Pin to ubuntu-22.04 (GLIBC 2.35) so the resulting binaries
                      # run on Ubuntu 22.04 LTS, Debian 12, RHEL 9, and any newer
                      # distro. ubuntu-latest is now Ubuntu 24.04 (GLIBC 2.39),
                      # which produces binaries that refuse to load on stock LTS.
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                      artifact: rantaiclaw
                      archive_ext: tar.gz
                      cross_compiler: ""
                      linker_env: ""
                      linker: ""
                    - os: ubuntu-22.04
                      target: aarch64-unknown-linux-gnu
                      artifact: rantaiclaw
                      archive_ext: tar.gz
                      cross_compiler: gcc-aarch64-linux-gnu
                      linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
                      linker: aarch64-linux-gnu-gcc
                    - os: ubuntu-22.04
                      target: armv7-unknown-linux-gnueabihf
                      artifact: rantaiclaw
                      archive_ext: tar.gz
                      cross_compiler: gcc-arm-linux-gnueabihf
                      linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER
                      linker: arm-linux-gnueabihf-gcc
                    - os: macos-15-intel
                      target: x86_64-apple-darwin
                      artifact: rantaiclaw
                      archive_ext: tar.gz
                      cross_compiler: ""
                      linker_env: ""
                      linker: ""
                    - os: macos-14
                      target: aarch64-apple-darwin
                      artifact: rantaiclaw
                      archive_ext: tar.gz
                      cross_compiler: ""
                      linker_env: ""
                      linker: ""
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: rantaiclaw.exe
                      archive_ext: zip
                      cross_compiler: ""
                      linker_env: ""
                      linker: ""

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  ref: ${{ needs.prepare.outputs.release_ref }}

            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2

            - name: Install cross-compilation toolchain (Linux)
              if: runner.os == 'Linux' && matrix.cross_compiler != ''
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y ${{ matrix.cross_compiler }}

            - name: Build release
              shell: bash
              env:
                  LINKER_ENV: ${{ matrix.linker_env }}
                  LINKER: ${{ matrix.linker }}
              run: |
                  if [ -n "$LINKER_ENV" ] && [ -n "$LINKER" ]; then
                    echo "Using linker override: $LINKER_ENV=$LINKER"
                    export "$LINKER_ENV=$LINKER"
                  fi
                  cargo build --profile release-fast --locked --target ${{ matrix.target }}

            - name: Check binary size (Unix)
              if: runner.os != 'Windows'
              run: ./scripts/ci/check_binary_size.sh "target/${{ matrix.target }}/release-fast/${{ matrix.artifact }}" "${{ matrix.target }}"

            - name: Package (Unix)
              if: runner.os != 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release-fast
                  tar czf ../../../rantaiclaw-${{ matrix.target }}.${{ matrix.archive_ext }} ${{ matrix.artifact }}

            - name: Package (Windows)
              if: runner.os == 'Windows'
              run: |
                  cd target/${{ matrix.target }}/release-fast
                  7z a ../../../rantaiclaw-${{ matrix.target }}.${{ matrix.archive_ext }} ${{ matrix.artifact }}

            - name: Upload artifact
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: rantaiclaw-${{ matrix.target }}
                  path: rantaiclaw-${{ matrix.target }}.${{ matrix.archive_ext }}
                  retention-days: 7

    verify-artifacts:
        name: Verify Artifact Set
        needs: [prepare, build-release]
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  path: artifacts

            - name: Validate expected archives
              shell: bash
              run: |
                  set -euo pipefail
                  expected=(
                    "rantaiclaw-x86_64-unknown-linux-gnu.tar.gz"
                    "rantaiclaw-aarch64-unknown-linux-gnu.tar.gz"
                    "rantaiclaw-armv7-unknown-linux-gnueabihf.tar.gz"
                    "rantaiclaw-x86_64-apple-darwin.tar.gz"
                    "rantaiclaw-aarch64-apple-darwin.tar.gz"
                    "rantaiclaw-x86_64-pc-windows-msvc.zip"
                  )

                  missing=0
                  for file in "${expected[@]}"; do
                    if ! find artifacts -type f -name "$file" -print -quit | grep -q .; then
                      echo "::error::Missing release archive: $file"
                      missing=1
                    fi
                  done

                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi

                  echo "All expected release archives are present."

    publish:
        name: Publish Release
        if: needs.prepare.outputs.publish_release == 'true'
        needs: [prepare, verify-artifacts]
        runs-on: ubuntu-latest
        timeout-minutes: 90
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  ref: ${{ needs.prepare.outputs.release_ref }}

            - name: Download all artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
              with:
                  path: artifacts

            - name: Install syft
              run: |
                  curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

            - name: Generate SBOM (CycloneDX)
              run: |
                  syft dir:. --source-name rantaiclaw -o cyclonedx-json=artifacts/rantaiclaw.cdx.json -o spdx-json=artifacts/rantaiclaw.spdx.json
                  {
                    echo "### SBOM Generated"
                    echo "- CycloneDX: rantaiclaw.cdx.json"
                    echo "- SPDX: rantaiclaw.spdx.json"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Generate SHA256 checksums
              run: |
                  cd artifacts
                  find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.cdx.json' -o -name '*.spdx.json' \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS
                  echo "Generated checksums:"
                  cat SHA256SUMS

            - name: Generate release manifest
              shell: bash
              run: |
                  set -euo pipefail
                  cat > artifacts/release-manifest.json <<JSON
                  {
                    "project": "rantaiclaw",
                    "release_tag": "${{ needs.prepare.outputs.release_tag }}",
                    "release_ref": "${{ needs.prepare.outputs.release_ref }}",
                    "source_sha": "${GITHUB_SHA}",
                    "run_id": "${GITHUB_RUN_ID}",
                    "run_number": "${GITHUB_RUN_NUMBER}",
                    "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                  }
                  JSON
                  cat artifacts/release-manifest.json

            - name: Install cosign
              uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

            - name: Sign artifacts with cosign (keyless)
              shell: bash
              run: |
                  set -euo pipefail
                  while IFS= read -r -d '' file; do
                    cosign sign-blob --yes \
                      --bundle="${file}.bundle" \
                      --output-signature="${file}.sig" \
                      --output-certificate="${file}.pem" \
                      "$file"
                  done < <(find artifacts -type f ! -name '*.sig' ! -name '*.pem' ! -name '*.bundle' -print0)

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute Docker release tags
              id: docker_meta
              shell: bash
              env:
                  RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
              run: |
                  set -euo pipefail
                  image="${REGISTRY}/${IMAGE_NAME}"
                  image="${image,,}"
                  sha_tag="${image}:sha-${GITHUB_SHA::12}"
                  tags="${image}:${RELEASE_TAG},${sha_tag}"
                  echo "tags=${tags}" >> "$GITHUB_OUTPUT"

            - name: Build and push release Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.docker_meta.outputs.tags }}
                  platforms: linux/amd64,linux/arm64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Create GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  tag_name: ${{ needs.prepare.outputs.release_tag }}
                  target_commitish: ${{ github.sha }}
                  draft: ${{ needs.prepare.outputs.draft_release == 'true' }}
                  generate_release_notes: true
                  files: |
                      artifacts/**/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
