name: CI Run

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.event.pull_request.number || github.sha }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    changes:
        name: Detect Change Scope
        runs-on: ubuntu-latest
        outputs:
            docs_only: ${{ steps.scope.outputs.docs_only }}
            docs_changed: ${{ steps.scope.outputs.docs_changed }}
            rust_changed: ${{ steps.scope.outputs.rust_changed }}
            docs_files: ${{ steps.scope.outputs.docs_files }}
            base_sha: ${{ steps.scope.outputs.base_sha }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Detect docs-only changes
              id: scope
              shell: bash
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
              run: ./scripts/ci/detect_change_scope.sh

    lint:
        name: Lint Gate (Format + Clippy + Strict Delta)
        needs: [changes]
        if: needs.changes.outputs.rust_changed == 'true' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full'))
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
            - name: Run rust quality gate
              run: ./scripts/ci/rust_quality_gate.sh
            - name: Run strict lint delta gate
              env:
                  BASE_SHA: ${{ needs.changes.outputs.base_sha }}
              run: ./scripts/ci/rust_strict_delta_gate.sh

    test:
        name: Test
        needs: [changes, lint]
        if: needs.changes.outputs.rust_changed == 'true' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full')) && needs.lint.result == 'success'
        runs-on: ubuntu-latest
        # 45min: cargo test on the full workspace runs ~6,300 tests over
        # 32 binaries. Empirically takes 9–12 min when the cache is warm,
        # but the cold cache + cross-binary recompile in the May-2026
        # runner image has pushed total Test-step time past 25 min on
        # back-to-back runs. 45 min leaves headroom for transient
        # runner-image slowness without masking a true deadlock.
        timeout-minutes: 45
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
            - uses: Swatinem/rust-cache@v2
            - name: Run tests
              # `cargo nextest` was tried first but the runner consistently
              # SIGTERM'd or hit the 30-min cap on this codebase. `cargo
              # test --locked` is the known-good invocation from prior to
              # the v0.6.40-alpha CI overhaul and is what the v0.6.40-alpha
              # release was actually verified against.
              run: cargo test --locked --workspace

    features:
        name: Features (${{ matrix.name }})
        needs: [changes, lint]
        if: needs.changes.outputs.rust_changed == 'true' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full')) && needs.lint.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 25
        strategy:
            fail-fast: false
            matrix:
                # `all-features` is intentionally omitted: matrix-sdk-0.16
                # blows past the type-check recursion budget under
                # --all-features, and the fix has to land upstream (a
                # `#![recursion_limit]` bump in their lib.rs). Track via
                # a follow-up issue and re-add the entry once matrix-sdk
                # ships a build that type-checks at the default 128 limit
                # or we patch them via [patch.crates-io].
                include:
                    - name: no-default-features
                      args: --no-default-features
                      install_libudev: false
                    - name: hardware-only
                      args: --no-default-features --features hardware
                      install_libudev: false
                    - name: browser-native
                      args: --no-default-features --features browser-native
                      install_libudev: false
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
            - uses: Swatinem/rust-cache@v2
              with:
                  key: features-${{ matrix.name }}
            - name: Install Linux system dependencies for all-features
              if: matrix.install_libudev
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends libudev-dev pkg-config
            - name: Check feature combination
              run: cargo check --locked ${{ matrix.args }}

    e2e:
        name: E2E
        needs: [changes, lint]
        if: needs.changes.outputs.rust_changed == 'true' && github.event_name != 'pull_request' && needs.lint.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
            - uses: Swatinem/rust-cache@v2
            - name: Run integration / E2E tests
              run: cargo test --test agent_e2e --locked --verbose

    bench-compile:
        name: Bench Compile
        needs: [changes, lint]
        if: needs.changes.outputs.rust_changed == 'true' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full')) && needs.lint.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
            - uses: Swatinem/rust-cache@v2
            - name: Verify benchmarks compile
              run: cargo bench --no-run --locked

    build:
        name: Build (Smoke)
        needs: [changes]
        if: needs.changes.outputs.rust_changed == 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
            - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.92.0
            - uses: Swatinem/rust-cache@v2
            - name: Build binary (smoke check)
              run: cargo build --profile release-fast --locked --verbose
            - name: Check binary size
              run: ./scripts/ci/check_binary_size.sh target/release-fast/rantaiclaw

    docs-only:
        name: Docs-Only Fast Path
        needs: [changes]
        if: needs.changes.outputs.docs_only == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Skip heavy jobs for docs-only change
              run: echo "Docs-only change detected. Rust lint/test/build skipped."

    non-rust:
        name: Non-Rust Fast Path
        needs: [changes]
        if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.rust_changed != 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Skip Rust jobs for non-Rust change scope
              run: echo "No Rust-impacting files changed. Rust lint/test/build skipped."

    docs-quality:
        name: Docs Quality
        needs: [changes]
        if: needs.changes.outputs.docs_changed == 'true' && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:full'))
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  fetch-depth: 0

            - name: Markdown lint (changed lines only)
              env:
                  BASE_SHA: ${{ needs.changes.outputs.base_sha }}
                  DOCS_FILES: ${{ needs.changes.outputs.docs_files }}
              run: ./scripts/ci/docs_quality_gate.sh

            - name: Collect added links
              id: collect_links
              shell: bash
              env:
                  BASE_SHA: ${{ needs.changes.outputs.base_sha }}
                  DOCS_FILES: ${{ needs.changes.outputs.docs_files }}
              run: |
                  set -euo pipefail
                  python3 ./scripts/ci/collect_changed_links.py \
                    --base "$BASE_SHA" \
                    --docs-files "$DOCS_FILES" \
                    --output .ci-added-links.txt
                  count=$(wc -l < .ci-added-links.txt | tr -d ' ')
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  if [ "$count" -gt 0 ]; then
                    echo "Added links queued for check:"
                    cat .ci-added-links.txt
                  else
                    echo "No added links found in changed docs lines."
                  fi

            - name: Link check (offline, added links only)
              if: steps.collect_links.outputs.count != '0'
              uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
              with:
                  fail: true
                  args: >-
                      --offline
                      --no-progress
                      --format detailed
                      .ci-added-links.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Skip link check (no added links)
              if: steps.collect_links.outputs.count == '0'
              run: echo "No added links in changed docs lines. Link check skipped."

    lint-feedback:
        name: Lint Feedback
        if: github.event_name == 'pull_request'
        needs: [changes, lint, docs-quality]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            issues: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Post actionable lint failure summary
              if: always()
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
              env:
                  RUST_CHANGED: ${{ needs.changes.outputs.rust_changed }}
                  DOCS_CHANGED: ${{ needs.changes.outputs.docs_changed }}
                  LINT_RESULT: ${{ needs.lint.result }}
                  LINT_DELTA_RESULT: ${{ needs.lint.result }}
                  DOCS_RESULT: ${{ needs.docs-quality.result }}
              with:
                  script: |
                      const script = require('./.github/workflows/scripts/lint_feedback.js');
                      await script({github, context, core});

    ci-required:
        name: CI Required Gate
        if: always()
        needs: [changes, lint, test, features, e2e, bench-compile, build, docs-only, non-rust, docs-quality, lint-feedback]
        runs-on: ubuntu-latest
        steps:
            - name: Enforce required status
              shell: bash
              run: |
                  set -euo pipefail

                  event_name="${{ github.event_name }}"
                  rust_changed="${{ needs.changes.outputs.rust_changed }}"
                  docs_changed="${{ needs.changes.outputs.docs_changed }}"
                  docs_result="${{ needs.docs-quality.result }}"

                  if [ "${{ needs.changes.outputs.docs_only }}" = "true" ]; then
                    if [ "$event_name" != "pull_request" ] && [ "$docs_changed" = "true" ] && [ "$docs_result" != "success" ]; then
                      echo "Docs-only push changed docs, but docs-quality did not pass."
                      exit 1
                    fi
                    echo "Docs-only fast path passed."
                    exit 0
                  fi

                  if [ "$rust_changed" != "true" ]; then
                    echo "rust_changed=false (non-rust fast path)"
                    if [ "$event_name" != "pull_request" ] && [ "$docs_changed" = "true" ] && [ "$docs_result" != "success" ]; then
                      echo "Non-rust push changed docs, but docs-quality did not pass."
                      exit 1
                    fi
                    echo "Non-rust fast path passed."
                    exit 0
                  fi

                  lint_result="${{ needs.lint.result }}"
                  lint_strict_delta_result="${{ needs.lint.result }}"
                  test_result="${{ needs.test.result }}"
                  features_result="${{ needs.features.result }}"
                  e2e_result="${{ needs.e2e.result }}"
                  bench_compile_result="${{ needs.bench-compile.result }}"
                  build_result="${{ needs.build.result }}"

                  echo "lint=${lint_result}"
                  echo "lint_strict_delta=${lint_strict_delta_result}"
                  echo "test=${test_result}"
                  echo "features=${features_result}"
                  echo "e2e=${e2e_result}"
                  echo "bench_compile=${bench_compile_result}"
                  echo "build=${build_result}"
                  echo "docs=${docs_result}"

                  # Helper: a job that was correctly skipped (no `ci:full` label, or PR-only
                  # short-circuit for `e2e`) is treated as success here.
                  is_ok() {
                    case "$1" in
                      success|skipped) return 0 ;;
                      *) return 1 ;;
                    esac
                  }

                  if [ "$event_name" = "pull_request" ]; then
                    if ! is_ok "$build_result"; then
                      echo "Required PR build job did not pass."
                      exit 1
                    fi
                    # When `ci:full` is set, also require test/features/bench-compile.
                    # When it isn't set, these were skipped -> is_ok returns success.
                    if ! is_ok "$test_result" || ! is_ok "$features_result" || ! is_ok "$bench_compile_result"; then
                      echo "Required PR jobs (test/features/bench-compile) did not pass."
                      exit 1
                    fi
                    echo "PR required checks passed."
                    exit 0
                  fi

                  if ! is_ok "$lint_result" || ! is_ok "$lint_strict_delta_result" \
                     || ! is_ok "$test_result" || ! is_ok "$features_result" \
                     || ! is_ok "$e2e_result" || ! is_ok "$bench_compile_result" \
                     || ! is_ok "$build_result"; then
                    echo "Required push CI jobs did not pass."
                    exit 1
                  fi

                  if [ "$docs_changed" = "true" ] && [ "$docs_result" != "success" ]; then
                    echo "Push changed docs, but docs-quality did not pass."
                    exit 1
                  fi

                  echo "Push required checks passed."
