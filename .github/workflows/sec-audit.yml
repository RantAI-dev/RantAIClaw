name: Sec Audit

on:
    push:
        branches: [main]
        paths:
            - "Cargo.toml"
            - "Cargo.lock"
            - "src/**"
            - "crates/**"
            - "deny.toml"
    pull_request:
        branches: [main]
        paths:
            - "Cargo.toml"
            - "Cargo.lock"
            - "src/**"
            - "crates/**"
            - "deny.toml"
    schedule:
        - cron: "0 6 * * 1" # Weekly on Monday 6am UTC

concurrency:
    group: security-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write
    actions: read
    checks: write

env:
    CARGO_TERM_COLOR: always

jobs:
    audit:
        name: Security Audit
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  # russh SSH stack (opt-in remote-install tools); mirrors deny.toml.
                  # rsa Marvin sidechannel + russh/russh-cryptovec allocation advisories,
                  # no upstream fix for the 2026 set — revisit on a russh bump.
                  ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0153,RUSTSEC-2026-0154,RUSTSEC-2026-0159

    deny:
        name: License & Supply Chain
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
              with:
                  command: check advisories licenses sources
